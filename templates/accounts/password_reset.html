{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reset Password — Rentify</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="{% static 'css/auth-modal.css' %}">
<style>
  body{background:linear-gradient(135deg,#0A0A1A,#0F172A,#1E1B4B);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;font-family:'Inter',sans-serif;}
  .auth-wrap{width:100%;max-width:440px;}
  .auth-brand{text-align:center;margin-bottom:1.5rem;}
  .auth-brand a{font-size:1.6rem;font-weight:900;letter-spacing:-.04em;color:#fff;text-decoration:none;}
  .auth-brand span{color:#00D084;} .auth-brand em{color:#F59E0B;font-style:normal;}
  .auth-card{background:#fff;border-radius:24px;padding:2rem;box-shadow:0 32px 80px rgba(0,0,0,.4);}
  .icon-wrap{width:56px;height:56px;border-radius:16px;background:#EFF6FF;color:#2563EB;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 0 1.25rem;}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-brand"><a href="/">Rent<span>ify</span><em>.</em></a></div>
  <div class="auth-card">
    <div class="icon-wrap"><i class="bi bi-key-fill"></i></div>
    <h2 style="font-weight:800;font-size:1.35rem;margin-bottom:.3rem;">Reset your password</h2>
    <p style="color:#71717A;font-size:.875rem;margin-bottom:1.5rem;">Enter your email and we'll send you a reset link.</p>
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="rfy-field">
        <label>Email Address</label>
        <div class="rfy-input-wrap">
          <i class="bi bi-envelope rfy-input-icon"></i>
          {{ form.email }}
        </div>
        {% if form.email.errors %}<div class="rfy-field-error"><i class="bi bi-exclamation-circle"></i>{{ form.email.errors.0 }}</div>{% endif %}
      </div>
      <button type="submit" class="rfy-submit">
        <i class="bi bi-send"></i> Send Reset Link
      </button>
    </form>
    <p style="text-align:center;margin-top:1rem;font-size:.82rem;"><a href="{% url 'login' %}" style="color:#2563EB;">← Back to Sign In</a></p>
  </div>
</div>
</body>
</html>
