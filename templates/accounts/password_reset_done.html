{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Check Your Email — Rentify</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="{% static 'css/auth-modal.css' %}">
<style>
  body{background:linear-gradient(135deg,#0A0A1A,#0F172A);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;font-family:'Inter',sans-serif;}
  .auth-card{background:#fff;border-radius:24px;padding:2.5rem 2rem;box-shadow:0 32px 80px rgba(0,0,0,.4);width:100%;max-width:420px;text-align:center;}
  .success-icon{width:72px;height:72px;border-radius:50%;background:#DCFCE7;color:#16A34A;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 1.5rem;}
</style>
</head>
<body>
<div class="auth-card">
  <div class="success-icon"><i class="bi bi-envelope-check-fill"></i></div>
  <h2 style="font-weight:800;font-size:1.35rem;margin-bottom:.5rem;">Check your email</h2>
  <p style="color:#71717A;font-size:.9rem;line-height:1.7;margin-bottom:1.5rem;">
    We've sent a password reset link to your email. Check your inbox (and spam folder).
  </p>
  <a href="{% url 'login' %}" class="rfy-submit" style="display:inline-flex;text-decoration:none;">
    Back to Sign In
  </a>
</div>
</body>
</html>
